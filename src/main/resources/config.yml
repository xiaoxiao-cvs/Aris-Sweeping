# ========================================================================
#                    Aris Sweeping (女仆爱丽丝) 插件配置文件
#                  高性能 Minecraft 1.20.1 服务端实体清理插件
# ========================================================================
#
# 插件功能说明：
# - 智能实体清理：自动清理掉落物、经验球、箭矢等
# - 畜牧业管理：监控动物密度，防止过度繁殖
# - 性能监控：实时监控TPS，自动优化服务器性能
# - 区域管理：支持自定义区域，精确管理不同区域的实体
# - 聚集清理：智能检测实体聚集，优化清理策略
#
# 配置建议：
# - 小型服务器（10人以下）：使用较宽松的阈值
# - 中型服务器（10-50人）：使用默认配置
# - 大型服务器（50人以上）：使用较严格的阈值
#
# ========================================================================

# ==================== 基础设置 ====================
general:
  # 清理间隔（秒）
  # 说明：多久执行一次自动清理
  # 建议值：小型服务器 600秒，中型服务器 300秒，大型服务器 180秒
  # 注意：间隔过短可能影响性能，过长可能导致实体堆积
  cleanupInterval: 300

# ==================== 实体清理设置 ====================
entity_cleanup:
  # 是否清理掉落物
  # 说明：清理玩家死亡或挖掘产生的掉落物品
  # 建议：通常启用，避免物品堆积影响性能
  cleanupItems: true
  
  # 是否清理经验球
  # 说明：清理击杀怪物或挖掘产生的经验球
  # 建议：启用，经验球是主要的性能杀手之一
  cleanupExperienceOrbs: true
  
  # 是否清理箭矢
  # 说明：清理射击后留在地面或墙上的箭矢
  # 建议：启用，大量箭矢会严重影响性能
  cleanupArrows: true
  
  # 是否清理掉落方块
  # 说明：清理沙子、砂砾等掉落的方块实体
  # 建议：启用，避免掉落方块堆积
  cleanupFallingBlocks: true
  
  # 是否清理敌对生物
  # 说明：清理僵尸、骷髅等敌对生物（启用时只清理50%，保持生态平衡）
  # 建议：谨慎启用，可能影响游戏体验
  cleanupHostileMobs: false
  
  # 是否清理被动生物
  # 说明：清理牛、猪、鸡等被动生物
  # 建议：保持关闭，避免误删玩家养殖的动物
  cleanupPassiveMobs: false

# ==================== 清理阈值设置 ====================
# 针对不同规模服务器的优化配置
thresholds:
  # 每个区块最大物品数量
  # 说明：单个区块内物品数量超过此值时触发清理
  # 建议值：小型服务器 60，中型服务器 40，大型服务器 30
  maxItemsPerChunk: 40
  
  # 每个区块最大实体数量
  # 说明：单个区块内所有实体数量超过此值时触发清理
  # 建议值：小型服务器 150，中型服务器 100，大型服务器 80
  maxEntitiesPerChunk: 100
  
  # 物品存在时间阈值（秒）
  # 说明：物品在地面存在超过此时间后被清理
  # 建议值：小型服务器 180秒，中型服务器 120秒，大型服务器 60秒
  itemAgeThreshold: 60

# ==================== 畜牧业管理设置 ====================
# 智能监控动物密度，防止过度繁殖影响服务器性能
livestock:
  # 是否启用畜牧业密度检测
  # 说明：开启后会监控各区域的动物密度，防止过度繁殖
  # 建议：建议启用，有效防止动物过度繁殖导致的性能问题
  enableDensityCheck: true
  
  # 每个区块最大动物数量
  # 说明：单个区块内动物数量超过此值时触发警告或清理
  # 建议值：小型服务器 80-100，中型服务器 50-70，大型服务器 30-50
  # 注意：设置过低会频繁触发警告，过高则失去监控意义
  maxAnimalsPerChunk: 50
  
  # 预警时间（分钟）
  # 说明：清理前提前多久通知玩家
  # 建议：3-10分钟，给玩家足够时间处理
  warningTime: 5
  
  # 是否启用预警广播
  # 说明：当动物密度超标时是否向全服广播警告
  # 建议：启用，让相关玩家及时了解情况
  enableWarning: true
  
  # 警告冷却时间（秒）
  # 说明：防止重复警告的冷却期，避免刷屏
  # 建议：30-120秒，平衡提醒效果和用户体验
  warningCooldown: 60
  
  # ==================== 区域解析功能 ====================
  # 支持自定义区域，精确管理不同区域的畜牧业
  regions:
    # 启用区域解析功能
    # 说明：启用后可以为不同区域设置不同的管理策略
    # 建议：启用，便于精细化管理大型服务器
    enabled: true
    
    # 玩家称呼
    # 说明：在警告消息中对管理员的称呼
    # 可自定义：如"管理员"、"服主"、"老师"、"站长"等
    playerTitle: "老师"
    
    # 区域定义（对角点坐标）
    # 说明：定义各个区域的边界坐标和基本信息
    # 格式：区域ID -> 区域信息（名称、世界、坐标范围）
    # 注意：x1,z1 和 x2,z2 分别为区域的两个对角点坐标
    areas:
      # 示例区域1：计算机学院自管区
      computer_college:
        name: "计算机学院自管区"  # 区域显示名称
        world: "world"              # 所属世界名称
        x1: -1000                   # 西边界坐标
        z1: -1000                   # 北边界坐标
        x2: -500                    # 东边界坐标
        z2: -500                    # 南边界坐标
      
      # 示例区域2：商学院自管区
      business_college:
        name: "商学院自管区"        # 区域显示名称
        world: "world"              # 所属世界名称
        x1: 500                     # 西边界坐标
        z1: 500                     # 北边界坐标
        x2: 1000                    # 东边界坐标
        z2: 1000                    # 南边界坐标
      
      # 示例区域3：工程学院自管区
      engineering_college:
        name: "工程学院自管区"      # 区域显示名称
        world: "world"              # 所属世界名称
        x1: -500                    # 西边界坐标
        z1: 500                     # 北边界坐标
        x2: 0                       # 东边界坐标
        z2: 1000                    # 南边界坐标
  
  # ==================== 动物中文名称映射 ====================
  # 用于在警告消息中显示动物的中文名称，提升用户体验
  animalNames:
    # 常见农场动物
    cow: "牛"              # 牛
    pig: "猪"              # 猪
    chicken: "鸡"          # 鸡
    sheep: "羊"            # 羊
    horse: "马"            # 马
    rabbit: "兔子"         # 兔子
    
    # 宠物类动物
    wolf: "狼"             # 狼（驯服后为狗）
    cat: "猫"              # 猫
    parrot: "鹦鹉"         # 鹦鹉
    
    # 其他陆地动物
    llama: "羊驼"          # 羊驼
    donkey: "驴"           # 驴
    mule: "骡子"           # 骡子
    fox: "狐狸"            # 狐狸
    bee: "蜜蜂"            # 蜜蜂
    turtle: "海龟"         # 海龟
    panda: "熊猫"          # 熊猫
    polar_bear: "北极熊"   # 北极熊
    
    # 水生动物
    dolphin: "海豚"        # 海豚
    squid: "鱿鱼"          # 鱿鱼
    cod: "鳕鱼"            # 鳕鱼
    salmon: "鲑鱼"         # 鲑鱼
    tropical_fish: "热带鱼" # 热带鱼
    pufferfish: "河豚"     # 河豚

# ==================== 性能设置 ====================
# 针对不同规模服务器的性能优化配置
performance:
  # 是否启用性能监控
  # 说明：开启后会实时监控服务器性能指标
  # 建议：强烈建议启用，便于及时发现性能问题
  enableMonitoring: true
  
  # 是否使用异步清理
  # 说明：异步处理可避免清理过程中的服务器卡顿
  # 建议：强烈建议开启，特别是大型服务器
  asyncCleanup: true
  
  # 每tick处理的最大区块数
  # 说明：控制每个游戏刻处理的区块数量，避免一次性处理过多
  # 建议值：小型服务器 8-12，中型服务器 5-8，大型服务器 3-5
  maxChunksPerTick: 5
  
  # 分批处理大小
  # 说明：每批处理的实体数量，分批可减少单次处理压力
  # 建议：50-200，根据服务器性能调整
  batchSize: 100
  
  # 批次间延迟（毫秒）
  # 说明：批次之间的等待时间，减少服务器压力
  # 建议：5-20毫秒，平衡处理速度和性能影响
  batchDelay: 10
  
  # 低TPS阈值
  # 说明：服务器TPS低于此值时触发紧急清理模式
  # 建议值：15.0-18.0，过低可能导致频繁触发紧急模式
  lowTpsThreshold: 15.0
  
  # 紧急清理模式阈值
  # 说明：当TPS过低时使用更严格的清理标准
  # 目的：快速恢复服务器性能
  emergencyThresholds:
    maxItemsPerChunk: 20      # 紧急模式下每区块最大物品数
    maxEntitiesPerChunk: 60   # 紧急模式下每区块最大实体数
    itemAgeThreshold: 30      # 紧急模式下物品存在时间阈值（秒）

# ==================== TPS监控设置 ====================
# 实时监控服务器TPS，及时发现性能问题
tps_monitoring:
  # 是否启用TPS监控
  # 说明：监控服务器每秒处理的游戏刻数
  # 建议：强烈建议启用，TPS是服务器性能的核心指标
  enabled: true
  
  # 低TPS阈值
  # 说明：TPS低于此值时触发警告
  # 标准：正常TPS为20，低于15开始严重影响游戏体验
  lowTpsThreshold: 15.0
  
  # 是否启用紧急清理
  # 说明：当TPS过低时自动执行清理操作
  # 建议：启用，有助于自动恢复服务器性能
  emergencyCleanup: true
  
  # TPS检查间隔（秒）
  # 说明：多久检查一次TPS数值
  # 建议：20-60秒，过于频繁会增加开销
  checkInterval: 30
  
  # 连续低TPS次数阈值
  # 说明：连续多少次检测到低TPS后触发清理
  # 建议：2-5次，避免偶发性低TPS触发清理
  consecutiveLowTpsThreshold: 3
  
  # 低TPS清理强度
  # 说明：TPS过低时的清理强度倍数（1.0-3.0）
  # 建议：1.5-2.5，数值越高清理越激进
  lowTpsCleanupIntensity: 2.0
  
  # 是否在低TPS时优先清理聚集实体
  # 说明：优先处理聚集的实体，效果更明显
  # 建议：启用，聚集实体是性能问题的主要原因
  prioritizeClusterCleanup: true

# ==================== 聚集清理设置 ====================
# 智能检测实体聚集，优化清理策略
cluster_cleanup:
  # 是否启用聚集清理算法
  # 说明：检测并清理聚集在一起的大量实体
  # 建议：启用，有效处理实体聚集导致的性能问题
  enabled: true
  
  # 聚集检测距离（方块）
  # 说明：在此距离内检测实体聚集情况
  # 建议：3.0-8.0方块，过大会误判，过小会漏检
  detectionDistance: 5.0
  
  # 最小聚集大小
  # 说明：多少个实体聚集在一起才视为需要清理的聚集
  # 建议：6-12个，根据服务器情况调整
  minClusterSize: 8
  
  # 保留比例
  # 说明：清理聚集实体时保留的比例（0.0-1.0）
  # 建议：0.2-0.4，既清理过量实体又保持一定数量
  retainRatio: 0.3
  
  # 是否只计算同类型实体聚集
  # 说明：true=只有相同类型实体才算聚集，false=所有实体都计算
  # 建议：false，混合实体聚集同样影响性能
  sameTypeOnly: false

# ==================== 智能清理设置 ====================
# 高级清理功能，保护重要实体的同时优化性能
smart_cleanup:
  # 是否启用智能清理
  # 说明：使用智能算法进行更精准的实体清理
  # 建议：启用，提供更好的清理效果和用户体验
  enabled: true
  
  # 智能清理间隔（秒）
  # 说明：智能清理的执行间隔
  # 建议：60-300秒，平衡清理效果和性能开销
  interval: 120
  
  # 保护玩家附近的实体（方块半径）
  # 说明：玩家周围此半径内的实体不会被清理
  # 建议：16-64方块，保护玩家正在使用的实体
  protectRadius: 32
  
  # 是否保护有自定义名称的实体
  # 说明：玩家命名的实体不会被清理
  # 建议：启用，保护玩家的宠物和重要实体
  protectNamedEntities: true
  
  # 是否保护被拴绳的实体
  # 说明：被拴绳拴住的实体不会被清理
  # 建议：启用，保护玩家拴住的动物
  protectLeashedEntities: true
  
  # 是否保护被玩家骑乘的实体
  # 说明：正在被玩家骑乘的实体不会被清理
  # 建议：启用，避免清理玩家正在使用的坐骑
  protectRiddenEntities: true
  
  # 保护驯服的动物
  # 说明：被玩家驯服的动物不会被清理
  # 建议：启用，保护玩家的宠物
  protectTamedAnimals: true
  
  # 保护繁殖冷却中的动物
  # 说明：正在繁殖冷却期的动物不会被清理
  # 建议：启用，避免影响玩家的繁殖计划
  protectBreedingAnimals: true
  
  # 保护幼体动物
  # 说明：未成年的动物不会被清理
  # 建议：启用，保护动物的自然成长
  protectBabyAnimals: true
  
  # 是否根据生成原因过滤实体
  # 说明：根据实体的生成方式决定是否清理
  # 建议：启用，可以保护玩家生成的实体
  filterBySpawnReason: true

# ==================== 消息设置 ====================
# 自定义插件发送的各种消息内容
messages:
  # 是否广播清理消息
  # 说明：清理完成后是否向全服发送消息
  # 建议：启用，让玩家了解服务器维护情况
  broadcastCleanup: true
  
  # 是否显示详细清理统计
  # 说明：是否在清理消息中显示详细的统计数据
  # 建议：启用，便于管理员了解清理效果
  showCleanupStats: true
  
  # 清理完成消息
  # 变量：{items} = 清理的物品数量, {entities} = 清理的实体数量
  cleanupComplete: "§a[女仆爱丽丝] §7清理完成！清理了 §e{items}§7 个物品，§e{entities}§7 个实体"
  
  # TPS警告消息
  # 变量：{tps} = 当前TPS数值
  tpsWarning: "§c[女仆爱丽丝] §7服务器TPS较低 (§c{tps}§7)，建议检查服务器负载"
  
  # 畜牧业警告消息
  # 变量：{region} = 区域名称, {player} = 玩家称呼, {animalType} = 动物类型, {count} = 当前数量, {limit} = 限制数量
  livestockWarning: "§6[女仆爱丽丝] §7{region} 动物密度过高！{player} 请及时处理 §e{animalType}§7 (当前: §c{count}§7/§a{limit}§7)"
  
  # 聚集清理消息
  # 变量：{location} = 清理位置坐标
  clusterCleanup: "§a[女仆爱丽丝] §7在 §e{location}§7 清理了聚集的实体"

# ==================== 实体密度监控设置 ====================
# 监控各区域的实体密度，防止局部过载
entity_density:
  # 是否启用实体密度监控
  # 说明：监控各个区域的实体密度分布
  # 建议：启用，有助于发现实体分布不均的问题
  enabled: true
  
  # 监控间隔（秒）
  # 说明：多久检查一次实体密度
  # 建议：30-120秒，平衡监控效果和性能
  checkInterval: 60
  
  # 世界实体密度阈值
  # 说明：当世界实体总数超过此值时发出警告
  # 建议值：小型服务器 2000-3000，中型服务器 1500-2500，大型服务器 1000-2000
  # 注意：设置为-1可禁用此功能
  threshold: 1500
  
  # 密度警告阈值（实体数/区块）
  # 说明：区块实体密度超过此值时发送警告
  # 建议：60-100，根据服务器承载能力调整
  warningThreshold: 80
  
  # 密度危险阈值（实体数/区块）
  # 说明：区块实体密度超过此值时发送紧急警告
  # 建议：100-150，严重影响性能的临界值
  criticalThreshold: 120
  
  # 是否自动清理高密度区域
  # 说明：密度过高时是否自动清理部分实体
  # 建议：谨慎启用，可能影响玩家建筑
  autoCleanup: false

# ==================== 定时检查设置 ====================
# 定期执行各项检查任务，确保服务器稳定运行
scheduled_checks:
  # 是否启用定时实体数量检查
  # 说明：定期执行预设的检查任务
  # 建议：启用，有助于及时发现潜在问题
  enabled: true
  
  # 实体数量检查间隔（秒）
  # 说明：多久检查一次实体数量
  # 建议：60-300秒，平衡检查频率和性能
  entityCountCheckInterval: 120
  
  # 畜牧业密度检查间隔（秒）
  # 说明：多久检查一次畜牧业密度
  # 建议：120-600秒，畜牧业变化相对缓慢
  livestockDensityCheckInterval: 180
  
  # 性能指标检查间隔（秒）
  # 说明：多久检查一次性能指标（TPS、MSPT等）
  # 建议：30-120秒，性能指标需要较频繁监控
  performanceCheckInterval: 60
  
  # 是否在检查时自动记录日志
  # 说明：检查结果是否写入日志文件
  # 建议：启用，便于后续分析和排查问题
  logChecks: true
  
  # 检查结果保留时间（分钟）
  # 说明：检查结果在内存中保留多久
  # 建议：15-60分钟，平衡内存使用和数据可用性
  resultRetentionTime: 30
  
  # 是否启用预警系统
  # 说明：当指标接近阈值时提前警告
  # 建议：启用，提前预警比事后处理更有效
  enableEarlyWarning: true
  
  # 预警阈值比例
  # 说明：当指标达到阈值的多少比例时触发预警（0.8表示80%）
  # 建议：0.7-0.9，给管理员留出处理时间
  earlyWarningThreshold: 0.8
  
  # 检查间隔（分钟）
  # 说明：定时检查的总体间隔
  # 建议：5-15分钟，平衡检查频率和性能
  interval: 10
  
  # 检查项目列表
  # 说明：定时检查包含的具体项目
  # 可选项：entity_count, item_count, tps_status, livestock_density
  checks:
    - "entity_count"      # 检查实体数量
    - "item_count"        # 检查物品数量
    - "tps_status"        # 检查TPS状态
    - "livestock_density" # 检查畜牧业密度

# ==================== 全局设置 ====================
# 插件的全局配置选项
global:
  # 插件总开关
  # 说明：控制所有自动清理功能的主开关
  # 注意：默认关闭，需要手动启用
  enabled: true
  
  # 插件消息前缀
  # 说明：所有插件消息的统一前缀
  # 可自定义：修改颜色代码和文字内容
  prefix: "§a[女仆爱丽丝]§r"
  
  # 调试模式
  # 说明：开启后会输出详细的调试信息
  # 建议：仅在排查问题时启用，平时保持关闭
  debug: false
  
  # 日志级别
  # 说明：控制日志输出的详细程度
  # 选项：DEBUG, INFO, WARNING, ERROR
  # 建议：生产环境使用INFO，调试时使用DEBUG
  logLevel: "INFO"
  
  # 是否保存清理统计
  # 说明：是否记录清理操作的统计数据
  # 建议：启用，便于分析服务器实体分布情况
  saveStatistics: true

# ========================================================================
#                              配置文件结束
#                     感谢使用 Aris Sweeping 插件！
